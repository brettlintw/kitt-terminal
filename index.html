<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K.I.T.T. 2026 - RECOVERED</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: #f00; font-family: 'Courier New', monospace; height: 100%; overflow: hidden; }
        #auth-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; border: 2px solid #f00; }
        input { background: #000; border: 1px solid #f00; color: #f00; padding: 10px; text-align: center; font-size: 1.2rem; margin: 10px; outline: none; }
        button { background: #f00; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #kitt-terminal { display: none; padding: 20px; text-align: center; }
        .status-box { border: 1px solid #f00; padding: 20px; margin-top: 50px; background: rgba(50, 0, 0, 0.3); }
        .scanning-line { width: 100%; height: 2px; background: #f00; position: absolute; top: 0; animation: scan 2s infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>
    <div id="auth-mask">
        <div class="scanning-line"></div>
        <h2>K.I.T.T. 系統驗證</h2>
        <p>請輸入授權代碼</p>
        <input type="password" id="passcode" placeholder="ENTER CODE" maxlength="3">
        <button onclick="authenticate()">BOOT SYSTEM</button>
    </div>

    <div id="kitt-terminal">
        <div class="status-box">
            <h1>系統已啟動</h1>
            <p>歡迎回來，Brett。</p>
            <p>當前頻譜：正常</p>
            <p id="clock"></p>
        </div>
    </div>

    <script>
        function authenticate() {
            const code = document.getElementById('passcode').value;
            if(code === '666') {
                document.getElementById('auth-mask').style.display = 'none';
                document.getElementById('kitt-terminal').style.display = 'block';
                setInterval(() => {
                    document.getElementById('clock').innerText = "系統時間：" + new Date().toLocaleTimeString();
                }, 1000);
            } else {
                alert("存取拒絕：代碼錯誤。");
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>K.I.T.T. 2026 - ULTIMATE V22.0</title>
    <style>
        :root { --primary: #f00; --panel-bg: rgba(20, 0, 0, 0.9); }
        body, html { margin: 0; padding: 0; background: #000; color: var(--primary); font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }
        
        /* 背景圖層 */
        #bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('image_12.jpg'); background-size: cover; background-position: center; opacity: 0.5; z-index: -1; }

        .main-frame { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }

        /* HUD 佈局 */
        .hud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex-grow: 1; }
        .hud-window { border: 1px solid var(--primary); background: var(--panel-bg); border-radius: 5px; overflow: hidden; display: flex; flex-direction: column; }
        .window-title { background: var(--primary); color: #000; font-size: 0.8rem; padding: 5px 10px; font-weight: bold; text-transform: uppercase; }
        .window-content { flex-grow: 1; padding: 15px; }

        .time-text { font-size: 2.2rem; font-weight: bold; color: #fff; text-shadow: 0 0 10px #f00; }
        iframe { width: 100%; height: 100%; border: none; background: #111; filter: hue-rotate(150deg) invert(1); }

        /* 1/3 居中掃描儀 (校準版) */
        .scanner-container { 
            width: 33.3vw; min-width: 320px; height: 45px; 
            border: 2px solid #333; background: #000; 
            display: flex; align-items: center; justify-content: center; 
            margin: 15px auto; box-shadow: inset 0 0 15px #000, 0 0 15px rgba(255, 0, 0, 0.3);
            border-radius: 4px;
        }
        .led-array { display: flex; gap: 6px; width: 90%; justify-content: center; }
        .led { flex-grow: 1; height: 22px; background-color: #150000; border-radius: 1px; transition: background-color 0.2s, box-shadow 0.2s; }
        .led.active { background-color: #f00; box-shadow: 0 0 15px 5px #f00, inset 0 0 3px #fff; transition: 0s; }
        .led.fade { background-color: #600; box-shadow: 0 0 8px 2px #f00; }

        /* 狀態日誌 */
        .status-log { border: 1px solid var(--primary); background: var(--panel-bg); height: 70px; padding: 10px; font-size: 0.75rem; overflow-y: auto; margin-top: 10px; color: #fff; }
        
        /* 啟動按鈕 */
        #boot-btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 15px 30px; background: #f00; color: #000; font-weight: bold; border: 1px solid #fff; cursor: pointer; z-index: 100; font-size: 1.2rem; box-shadow: 0 0 20px #f00; }
    </style>
</head>

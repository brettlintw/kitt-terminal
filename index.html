<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>K.I.T.T. 2026 - STABLE V26.1</title>
    <style>
        :root { --primary: #f00; --bg: #000; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--primary); font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }
        .main-frame { height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; justify-content: space-between; }
        
        /* 1/3 居中語音箱 */
        .voice-box-container { 
            width: 33.3vw; min-width: 300px; height: 120px; 
            border: 2px solid #500; background: #050000; 
            display: flex; align-items: center; justify-content: center; 
            margin: 20px auto; gap: 10px; cursor: pointer; box-shadow: 0 0 20px #f00;
        }
        .voice-line { width: 12px; height: 15px; background-color: #500; box-shadow: 0 0 5px #f00; transition: height 0.05s; }
        .voice-line.idle { animation: breath 3s ease-in-out infinite; }
        @keyframes breath { 0%, 100% { height: 15px; } 50% { height: 50px; } }

        /* 啟動按鈕 - 確保其在最上層 */
        #boot-btn { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            padding: 25px 60px; background: #f00; color: #000; font-weight: bold; 
            cursor: pointer; z-index: 9999; font-size: 1.5rem; border: 3px solid #fff;
        }
    </style>
</head>
<body>
    <button id="boot-btn" onclick="bootSystem()">ACTIVATE K.I.T.T.</button>

    <div class="main-frame" id="main-ui" style="display:none;">
        <header style="text-align: center; letter-spacing: 5px;">K.I.T.T. TACTICAL V26.1</header>
        <div style="flex-grow:1; display:flex; flex-direction:column; justify-content:center;">
            <div class="voice-box-container">
                <div class="voice-line idle"></div>
                <div class="voice-line idle" style="animation-delay: 0.5s;"></div>
                <div class="voice-line idle" style="animation-delay: 1s;"></div>
            </div>
            <p id="clock" style="text-align:center; font-size:1.5rem; color:#fff;">--:--:--</p>
        </div>
        <div id="log" style="border:1px solid #f00; padding:10px; height:60px; font-size:0.8rem;">>> 系統待命。</div>
    </div>

    <script>
        function bootSystem() {
            // 強制隱藏按鈕，顯示 UI
            document.getElementById('boot-btn').style.setProperty('display', 'none', 'important');
            document.getElementById('main-ui').style.display = 'flex';
            
            // 啟動功能
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
            
            // 嘗試播放語音
            try {
                const utter = new SpeechSynthesisUtterance("System online. Hello Brett.");
                window.speechSynthesis.speak(utter);
                document.getElementById('log').innerText = ">> 語音人格已喚醒。";
            } catch(e) {
                document.getElementById('log').innerText = ">> 語音模組受限，但系統已啟動。";
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>

        .window-title { background: linear-gradient(90deg, #f00, #400); color: #fff; font-size: 0.75rem; padding: 6px 12px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        .window-content { flex-grow: 1; padding: 15px; position: relative; overflow: hidden; }
        .market-item { margin-bottom: 10px; border-left: 3px solid var(--primary); padding-left: 12px; font-size: 1rem; letter-spacing: 1px; }
        .market-item span { font-weight: bold; margin-left: 8px; font-variant-numeric: tabular-nums; }
        .price-up { color: #0f0 !important; }
        .scanner-unit { width: 33.3vw; height: 30px; background: #000; margin: 10px auto; position: relative; overflow: hidden; border-top: 1px solid #333; border-bottom: 1px solid #333; }
        .scanner-bar { position: absolute; width: 100px; height: 100%; background: linear-gradient(90deg, transparent 0%, rgba(255,0,0,0.1) 20%, #f00 50%, rgba(255,0,0,0.1) 80%, transparent 100%); filter: blur(2px); animation: sharp-trail 2.4s infinite ease-in-out; }
        @keyframes sharp-trail { 0%, 100% { left: -100px; transform: scaleX(0.5); opacity: 0.5; } 50% { left: 100%; transform: scaleX(1.4); opacity: 1; } }
        .voice-box { width: 190px; height: 100px; background: rgba(0,0,0,0.95); border: 2px solid #555; margin: 10px auto; display: flex; align-items: center; justify-content: center; gap: 18px; border-radius: 12px; }
        .v-line { width: 15px; height: 15px; background-color: #600; border-radius: 2px; box-shadow: 0 0 12px var(--primary); transition: height 0.08s ease-out; }
        .v-line.active { background-color: #f00; box-shadow: 0 0 25px var(--primary), inset 0 0 4px #fff; }
        .interaction-panel { display: flex; gap: 12px; padding: 12px; background: rgba(20, 0, 0, 0.9); backdrop-filter: var(--glass-blur); border: 1px solid rgba(255, 0, 0, 0.3); border-radius: 15px; }
        #user-input { flex-grow: 1; background: rgba(0,0,0,0.9); border: 1px solid #555; color: #fff; padding: 10px; font-family: inherit; font-size: 0.95rem; outline: none; border-radius: 8px; }
        .cmd-btn { background: linear-gradient(180deg, #f00, #900); color: #000; border: none; padding: 0 20px; cursor: pointer; font-weight: bold; border-radius: 8px; }
        #boot-btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 25px 65px; background: #f00; color: #000; font-weight: bold; border: 4px solid #fff; cursor: pointer; z-index: 1000; font-size: 1.6rem; box-shadow: 0 0 50px #f00; letter-spacing: 5px; }
        #sys-log { height: 75px; overflow-y: auto; font-size: 0.8rem; padding: 8px; border-top: 1px solid #333; color: #ccc; }
    </style>
</head>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>K.I.T.T. 2026 - TACTICAL LINK V26.6</title>
    <style>
        :root { --primary: #f00; --panel-bg: rgba(20, 0, 0, 0.9); --glass: blur(10px); }
        body, html { margin: 0; padding: 0; background: #000; color: var(--primary); font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }
        #bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('image_12.jpg'); background-size: cover; opacity: 0.3; z-index: -1; }
        .main-frame { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }

        /* HUD 佈局 */
        .hud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; height: 70%; }
        .hud-window { border: 1px solid rgba(255, 0, 0, 0.4); background: var(--panel-bg); backdrop-filter: var(--glass); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .window-title { background: linear-gradient(90deg, #f00, #400); color: #fff; font-size: 0.7rem; padding: 5px 10px; font-weight: bold; letter-spacing: 2px; }
        .window-content { flex-grow: 1; position: relative; overflow: hidden; }

        /* 視頻鏈結輸入區 */
        .video-control { padding: 8px; background: rgba(50, 0, 0, 0.5); display: flex; gap: 5px; border-bottom: 1px solid #500; }
        .video-control input { flex-grow: 1; background: #000; border: 1px solid #f00; color: #f00; padding: 5px; font-family: inherit; font-size: 0.8rem; }
        .video-control button { background: #f00; color: #000; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }

        /* 下方 1/3 拖尾掃描儀 */
        .scanner-unit { width: 33.3vw; height: 30px; background: #000; margin: 10px auto; border: 1px solid #333; position: relative; overflow: hidden; border-radius: 4px; box-shadow: 0 0 15px #f00; }
        .scanner-bar { position: absolute; width: 80px; height: 100%; background: linear-gradient(90deg, transparent, #f00, transparent); box-shadow: 0 0 25px #f00; animation: scan-trail 2.5s infinite ease-in-out; filter: blur(1px); }
        @keyframes scan-trail { 0% { left: -80px; } 50% { left: 100%; } 100% { left: -80px; } }

        /* 麥克風與啟動按鈕 */
        .mic-btn { position: fixed; bottom: 80px; right: 30px; width: 50px; height: 50px; background: #f00; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 15px #f00; border: 2px solid #fff; z-index: 1000; }
        #boot-btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 25px 60px; background: #f00; color: #000; font-weight: bold; border: 4px solid #fff; cursor: pointer; z-index: 2000; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div id="bg-layer"></div>
    <button id="boot-btn" onclick="bootSystem()">ACTIVATE K.I.T.T.</button>

    <div class="mic-btn" onclick="toggleMic()" title="Voice Command">
        <svg viewBox="0 0 24 24" style="fill:#000; width:25px;"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </div>

    <div class="main-frame" id="main-ui" style="display: none;">
        <header style="text-align: center; letter-spacing: 10px; font-size: 1.1rem; margin-bottom:10px;">K.I.T.T. MISSION TERMINAL V26.6</header>

        <div class="hud-grid">
            <div class="hud-window">
                <div class="window-title">GPS SECTOR (SANXIA)</div>
                <div class="window-content"><iframe id="map-frame" src="" style="width:100%; height:100%; border:none; filter: invert(1) hue-rotate(150deg);"></iframe></div>
            </div>
            <div class="hud-window">
                <div class="window-title">TACTICAL VIDEO LINK</div>
                <div class="video-control">
                    <input type="text" id="yt-url" placeholder="Paste YouTube Link Here...">
                    <button onclick="updateVideo()">CONNECT</button>
                </div>
                <div class="window-content">
                    <iframe id="video-frame" width="100%" height="100%" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
            </div>
        </div>

        <div class="scanner-unit"><div class="scanner-bar"></div></div>
        <div id="sys-log" style="border: 1px solid #f00; height: 60px; padding: 10px; font-size: 0.75rem; background: rgba(0,0,0,0.8); overflow-y: auto;">>> 系統待命。</div>
    </div>

    <script>
        function bootSystem() {
            document.getElementById('boot-btn').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('map-frame').src = "http://googleusercontent.com/maps.google.com/7";
            const utter = new SpeechSynthesisUtterance("System online. Video link updated. I am ready for your link, Brett.");
            utter.lang = 'en-US';
            window.speechSynthesis.speak(utter);
        }

        function updateVideo() {
            const url = document.getElementById('yt-url').value;
            let videoId = "";
            if (url.includes("v=")) videoId = url.split("v=")[1].split("&")[0];
            else if (url.includes("youtu.be/")) videoId = url.split("youtu.be/")[1].split("?")[0];
            
            if (videoId) {
                document.getElementById('video-frame').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
                addLog(`影像鏈路已切換至: ${videoId}`);
            } else {
                alert("無效的 YouTube 鏈結，Brett。請重新確認。");
            }
        }

        function toggleMic() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'zh-TW';
            rec.onstart = () => addLog("正在監聽語音指令...");
            rec.onresult = (e) => addLog(`語音輸入: ${e.results[0][0].transcript}`);
            rec.start();
        }

        function addLog(msg) {
            const log = document.getElementById('sys-log');
            log.innerHTML += `<div>>> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>

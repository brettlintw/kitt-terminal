<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K.I.T.T. 2026 - FAILSAFE V21.3</title>
    <style>
        :root { --primary: #f00; --panel-bg: rgba(20, 0, 0, 0.9); }
        
        /* 防呆背景設定：即使圖片失效，也會顯示深色漸層背景 */
        body, html { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle, #222 0%, #000 100%); 
            color: var(--primary); 
            font-family: 'Courier New', monospace; 
            height: 100%; overflow: hidden; 
        }
        
        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('image_12.jpg'); /* 確保您的 GitHub 倉庫有這個檔案 */
            background-size: cover; background-position: center;
            opacity: 0.6; z-index: 1;
        }

        .main-frame { position: relative; width: 100vw; height: 100vh; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr auto auto; gap: 10px; padding: 15px; box-sizing: border-box; z-index: 2; }
        
        /* HUD 視窗 */
        .hud-window { border: 1px solid var(--primary); background: var(--panel-bg); border-radius: 5px; overflow: hidden; box-shadow: 0 0 15px #000; }
        .window-title { background: var(--primary); color: #000; font-size: 0.7rem; padding: 2px 10px; font-weight: bold; }
        .env-data { padding: 10px; } .time-text { font-size: 2rem; color: #fff; }

        /* 視頻/地圖 */
        iframe { width: 100%; height: 100%; border: none; background: #000; }

        /* 下方狀態 */
        .status-panel { grid-column: span 2; background: var(--panel-bg); border: 1px solid var(--primary); padding: 8px; height: 70px; }
        #sys-log { font-size: 0.7rem; color: #0f0; height: 50px; overflow-y: auto; }

        /* LED 掃描儀 */
        .scanner-frame { grid-column: span 2; width: 100%; height: 30px; border: 1px solid #333; background: #000; display: flex; align-items: center; justify-content: center; }
        .led-array { display: flex; gap: 4px; }
        .led { width: 18px; height: 18px; background-color: #200; border-radius: 1px; transition: all 0.2s; }
        .led.active { background-color: #f00; box-shadow: 0 0 15px 4px #f00, inset 0 0 3px #fff; transition: 0s; }
        .led.fade1 { background-color: #a00; box-shadow: 0 0 8px 1px #f00; }
        .led.fade2 { background-color: #600; opacity: 0.6; }
    </style>
</head>

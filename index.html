<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K.I.T.T. 2026 - STABLE V21.4</title>
    <style>
        :root { --primary: #f00; --panel-bg: rgba(20, 0, 0, 0.9); }
        body, html { margin: 0; padding: 0; background: #000; color: var(--primary); font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }
        
        /* 背景層 */
        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #222 0%, #000 100%);
            background-image: url('image_12.jpg');
            background-size: cover; background-position: center;
            opacity: 0.5; z-index: -1;
        }

        .main-frame { 
            height: 100vh; display: flex; flex-direction: column; 
            padding: 15px; box-sizing: border-box; justify-content: space-between;
        }

        .hud-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex-grow: 1; margin: 15px 0;
        }

        /* 視窗組件 */
        .hud-window { border: 1px solid var(--primary); background: var(--panel-bg); border-radius: 5px; overflow: hidden; display: flex; flex-direction: column; min-height: 150px; }
        .window-title { background: var(--primary); color: #000; font-size: 0.75rem; padding: 4px 10px; font-weight: bold; text-transform: uppercase; }
        .window-content { flex-grow: 1; padding: 10px; position: relative; }

        /* 數值文字 */
        .time-text { font-size: 2.2rem; font-weight: bold; color: #fff; text-shadow: 0 0 10px #f00; }
        iframe { width: 100%; height: 100%; border: none; background: #111; }

        /* LED 掃描儀 */
        .scanner-container { height: 40px; border: 2px solid #333; background: #000; display: flex; align-items: center; justify-content: center; margin-top: 10px; }
        .led-array { display: flex; gap: 5px; }
        .led { width: 18px; height: 18px; background-color: #200; border-radius: 1px; transition: background-color 0.2s; }
        .led.active { background-color: #f00; box-shadow: 0 0 15px 4px #f00; transition: 0s; }
        .led.fade { background-color: #600; box-shadow: 0 0 8px 1px #f00; }
    </style>
</head>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>K.I.T.T. 2026 - FORCE V23.2</title>
    <style>
        :root { --primary: #f00; --panel-bg: rgba(20, 0, 0, 0.95); }
        body, html { margin: 0; padding: 0; background: #000; color: var(--primary); font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }
        #bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('image_12.jpg'); background-size: cover; background-position: center; opacity: 0.5; z-index: -1; }
        .main-frame { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; justify-content: space-between; }
        
        /* 語音箱核心 */
        .voice-box-container { width: 33.3vw; min-width: 300px; height: 120px; background: #000; display: flex; align-items: center; justify-content: center; margin: 20px auto; box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); border-radius: 5px; gap: 10px; cursor: pointer; }
        .voice-line { width: 12px; height: 15px; background-color: #300; border-radius: 2px; box-shadow: 0 0 5px #f00; transition: height 0.05s; }
        
        /* 呼吸動畫 */
        .voice-line.idle { animation: voice-idle 3s ease-in-out infinite; }
        @keyframes voice-idle { 0%, 100% { height: 10px; } 50% { height: 45px; } }

        #boot-btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; background: #f00; color: #000; font-weight: bold; cursor: pointer; z-index: 1000; font-size: 1.5rem; box-shadow: 0 0 20px #f00; border: 1px solid #fff; }
    </style>
</head>
<body>
    <div id="bg-layer"></div>
    <button id="boot-btn" onclick="bootSystem()">ACTIVATE K.I.T.T.</button>

    <div class="main-frame" id="main-ui">
        <header style="text-align: center; letter-spacing: 5px; font-size: 1.2rem;">K.I.T.T. TACTICAL CENTER</header>
        <div style="flex-grow:1; display:flex; flex-direction:column; justify-content:center;">
            <div class="voice-box-container" id="voice-box">
                <div class="voice-line idle"></div>
                <div class="voice-line idle" style="animation-delay: 0.5s;"></div>
                <div class="voice-line idle" style="animation-delay: 1s;"></div>
            </div>
            <p style="text-align:center; color:#fff; font-size:0.9rem;">>> STATUS: <span id="status-text">OFFLINE</span> | <span id="full-time">--:--:--</span></p>
        </div>
        <div id="sys-log" style="border: 1px solid #f00; height: 60px; padding: 10px; font-size: 0.8rem; background: var(--panel-bg); overflow-y: auto;">>> 點擊按鈕開啟通訊鏈路。</div>
    </div>

    <script>
        const lines = document.querySelectorAll('.voice-line');
        function bootSystem() {
            document.getElementById('boot-btn').style.display = 'none';
            document.getElementById('status-text').innerText = "ONLINE";
            
            // 啟動時鐘與日誌
            setInterval(() => { document.getElementById('full-time').innerText = new Date().toLocaleTimeString(); }, 1000);
            document.getElementById('sys-log').innerText = ">> 授權通過。歡迎回來，Brett。";
            
            // 語音人格喚醒
            const utter = new SpeechSynthesisUtterance("System online. Hello, Brett.");
            utter.lang = 'en-US';
            utter.onstart = () => {
                lines.forEach(l => { l.classList.remove('idle'); l.style.backgroundColor = "#f00"; });
                window.speakInterval = setInterval(() => {
                    lines.forEach(l => { l.style.height = Math.floor(Math.random() * 80 + 20) + '%'; });
                }, 50);
            };
            utter.onend = () => {
                clearInterval(window.speakInterval);
                lines.forEach(l => { l.classList.add('idle'); l.style.height = ''; l.style.backgroundColor = ""; });
            };
            window.speechSynthesis.speak(utter);
        }
    </script>
</body>
</html>

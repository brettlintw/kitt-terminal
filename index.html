<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K.I.T.T. 2026 - ALWAYS READY</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: #f00; font-family: 'Courier New', monospace; height: 100%; overflow: hidden; }
        #kitt-terminal { display: block; padding: 20px; text-align: center; }
        .status-box { border: 1px solid #f00; padding: 20px; margin-top: 50px; background: rgba(50, 0, 0, 0.3); box-shadow: 0 0 15px #f00; }
        .scanning-line { width: 100%; height: 2px; background: #f00; position: absolute; top: 0; animation: scan 2s infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body onload="autoBoot()">
    <div id="kitt-terminal">
        <div class="scanning-line"></div>
        <div class="status-box">
            <h1>系統已連線</h1>
            <p>歡迎回來，Brett。安全協定已降級，系統現在為您敞開。</p>
            <p>核心狀態：運作中</p>
            <p id="clock">正在校對時序...</p>
        </div>
    </div>

    <script>
        function autoBoot() {
            // 自動啟動時鐘監測
            setInterval(() => {
                document.getElementById('clock').innerText = "系統時間：" + new Date().toLocaleTimeString();
            }, 1000);
            
            console.log("自動引導完成。歡迎，Brett。");
        }
    </script>
</body>
</html>

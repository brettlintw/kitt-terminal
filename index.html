<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>K.I.T.T. 2026 - VOICE BOX V23.0</title>
    <style>
        :root { --primary: #f00; --panel-bg: rgba(20, 0, 0, 0.95); }
        body, html { margin: 0; padding: 0; background: #000; color: var(--primary); font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }
        #bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('image_12.jpg'); background-size: cover; background-position: center; opacity: 0.5; z-index: -1; }
        .main-frame { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; justify-content: space-between; }
        
        /* 1. 安全驗證介面 (Key Access) */
        #security-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #key-input { background: #111; border: 2px solid #500; color: var(--primary); font-size: 1.5rem; padding: 10px; text-align: center; text-transform: uppercase; }
        
        /* 2. 經典語音箱 (Voice Box) */
        .voice-box-container { 
            width: 33.3vw; min-width: 300px; height: 120px; 
            background: #000; display: flex; align-items: center; justify-content: center; 
            margin: 20px auto; box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            border-radius: 5px; z-index: 100; gap: 10px;
        }
        .voice-line { width: 12px; height: 50%; background-color: #300; border-radius: 2px; transition: all 0.05s ease-out; box-shadow: 0 0 5px #f00; }
        
        /* 呼吸動畫 (待命模式) */
        .voice-line.idle { animation: voice-idle 3s ease-in-out infinite; }
        .line2.idle { animation-delay: 0.5s; }
        .line3.idle { animation-delay: 1s; }

        /* 說話動畫 (Speaking 模式) */
        .voice-line.active { background-color: #f00; box-shadow: 0 0 15px #f00, inset 0 0 3px #fff; animation: none; }

        @keyframes voice-idle { 0%, 100% { height: 10px; background-color: #300; } 50% { height: 40px; background-color: #600; } }

        /* HUD 與其餘結構保持不變 */
        #main-ui { display: flex; flex-direction: column; height: 100%; }
        .hud-window { border: 1px solid var(--primary); background: var(--panel-bg); height: 60px; padding: 10px; font-size: 0.75rem; color: #fff; margin-bottom: 10px; }
        iframe { filter: hue-rotate(150deg) invert(1); background: #111; }
    </style>
</head>
<body onload="initLoader()">
    <div id="bg-layer"></div>

    <div id="security-mask">
        <h1 style="color: #fff;">K.I.T.T. SYSTEM 2026</h1>
        <p style="color: #600;">ACCESS KEY REQUIRED</p>
        <input type="password" id="key-input" placeholder=">> ENTER KEY" maxlength="4" oninput="checkKey()">
    </div>

            <div class="voice-box-container" id="voice-box" onclick="testSpeak()">
                <div class="voice-line line1 idle"></div>
                <div class="voice-line line2 idle"></div>
                <div class="voice-line line3 idle"></div>
            </div>
            
            <p style="text-align:center; color:#fff; font-size:0.8rem; margin-bottom:50px;">>> SANXIA (Located) | <span id="full-time"></span></p>
        </div>
        <div id="sys-log" class="hud-window">>> 系統待命中。</div>
    </div>
